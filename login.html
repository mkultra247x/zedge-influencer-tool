<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Zedge Influencer Finder</title>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --text: #e8e8f0;
  --text2: #8888aa;
  --green: #00cec9;
  --red: #ff6b6b;
  --border: #2d2d44;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
.login-container { width: 100%; max-width: 400px; padding: 20px; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 32px; text-align: center; }
.logo { font-size: 48px; margin-bottom: 16px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
h1 span { color: var(--accent2); }
.subtitle { color: var(--text2); font-size: 13px; margin-bottom: 32px; }
.input-group { text-align: left; margin-bottom: 20px; }
.input-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.input-group input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 14px 16px; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s;
  text-align: center; letter-spacing: 2px;
}
.input-group input:focus { border-color: var(--accent); }
.input-group input::placeholder { color: var(--text2); letter-spacing: 0; }
.btn-login {
  width: 100%; padding: 14px; background: var(--accent); color: white; border: none;
  border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-login:hover { background: var(--accent2); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.message { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: none; }
.message.error { background: rgba(255,107,107,0.1); color: var(--red); border: 1px solid rgba(255,107,107,0.2); display: block; }
.footer { text-align: center; margin-top: 24px; color: var(--text2); font-size: 11px; }
.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card" id="card">
    <div class="logo">🔍</div>
    <h1><span>Zedge</span> Influencer Finder</h1>
    <div class="subtitle">Enter the access password to continue</div>
    
    <div class="message" id="msgBox"></div>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="off" required autofocus>
      </div>
      <button type="submit" class="btn-login" id="submitBtn">Sign In →</button>
    </form>
  </div>
  <div class="footer">Internal Tool · Don't have the password? Ask Martynas</div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msgBox');
  
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  msg.className = 'message';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    
    if (!res.ok) {
      msg.textContent = data.error || 'Wrong password.';
      msg.className = 'message error';
      document.getElementById('card').classList.add('shake');
      setTimeout(() => document.getElementById('card').classList.remove('shake'), 500);
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      btn.disabled = false;
      btn.textContent = 'Sign In →';
      return;
    }

    window.location.reload();
  } catch (err) {
    msg.textContent = 'Network error. Please try again.';
    msg.className = 'message error';
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }
}
</script>
</body>
</html>
